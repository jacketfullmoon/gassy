<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Test</title>
  <style>
    body { margin: 0; background: #111; color: white; font-family: sans-serif; padding: 20px; }
    #status { font-size: 18px; margin-bottom: 10px; }
    #map { width: 100%; height: 60vh; border: 2px solid lime; }
  </style>
</head>
<body>
  <div id="status">Loading MapLibre...</div>
  <div id="map"></div>

  <script>
    document.getElementById('status').textContent = 'Script tag reached';
  </script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
  <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.js" onload="initMap()" onerror="document.getElementById('status').textContent = 'ERROR: MapLibre failed to load'"></script>

  <script>
    function initMap() {
      document.getElementById('status').textContent = 'MapLibre loaded! Starting map...';
      try {
        var map = new maplibregl.Map({
          container: 'map',
          style: {
            version: 8,
            sources: {
              osm: {
                type: 'raster',
                tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                tileSize: 256
              }
            },
            layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
          },
          center: [-118.2437, 34.0522],
          zoom: 12
        });
        map.on('load', function() {
          document.getElementById('status').textContent = 'SUCCESS - Map loaded!';
        });
        map.on('error', function(e) {
          document.getElementById('status').textContent = 'Map error: ' + e.error.message;
        });
      } catch(e) {
        document.getElementById('status').textContent = 'JS Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
