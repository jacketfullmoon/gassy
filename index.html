<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable"                content="yes" />
  <meta name="apple-mobile-web-app-capable"          content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title"            content="Gassy" />
  <meta name="theme-color"                           content="#080a10" />
  <title>Gassy</title>

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"><\/script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink:      #080a10;
      --ink2:     #10131c;
      --ink3:     #181d28;
      --rim:      rgba(255,255,255,0.06);
      --rim2:     rgba(255,255,255,0.10);
      --gold:     #f6c94e;
      --gold-dim: rgba(246,201,78,0.15);
      --green:    #39e08a;
      --amber:    #f6c94e;
      --red:      #ff5f5f;
      --sky:      #4fa3ff;
      --txt:      #eceef5;
      --txt2:     #7c8499;
      --r-sm:     10px;
      --r-md:     18px;
      --r-lg:     26px;
      --sat: env(safe-area-inset-top,    0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: -webkit-fill-available; }
    body {
      width: 100%; height: 100vh;
      height: -webkit-fill-available;
      background: var(--ink);
      color: var(--txt);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── SCREENS ── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      transition: opacity .45s ease, transform .45s ease, visibility .45s ease;
    }
    .screen.hidden {
      opacity: 0; visibility: hidden; pointer-events: none;
      transform: translateY(30px);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       WELCOME SCREEN
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #screen-welcome {
      background: var(--ink);
      align-items: center;
      justify-content: space-between;
      padding: calc(var(--sat) + 60px) 32px calc(var(--sab) + 48px);
      z-index: 10;
    }

    /* top section */
    .wlc-top {
      display: flex; flex-direction: column;
      align-items: center; gap: 0; width: 100%;
    }

    /* ambient glow */
    .wlc-glow {
      position: absolute; top: 10%; left: 50%;
      transform: translateX(-50%);
      width: 320px; height: 320px; border-radius: 50%;
      background: radial-gradient(circle, rgba(246,201,78,.11) 0%, transparent 65%);
      pointer-events: none;
    }

    .wlc-emoji {
      font-size: 64px; margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
      position: relative;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    .wlc-title {
      font-family: 'Syne', sans-serif;
      font-size: 52px; font-weight: 900;
      letter-spacing: -2.5px; line-height: 1;
      color: var(--txt); text-align: center;
      margin-bottom: 6px;
    }
    .wlc-title span { color: var(--gold); }

    .wlc-sub {
      font-size: 16px; color: var(--txt2);
      text-align: center; line-height: 1.55;
      max-width: 260px; margin-top: 14px;
    }

    /* price ticker badge */
    .wlc-badge {
      display: flex; align-items: center; gap: 8px;
      margin-top: 28px;
      padding: 10px 18px;
      background: var(--gold-dim);
      border: 1px solid rgba(246,201,78,.25);
      border-radius: 50px;
      font-size: 13px; font-weight: 600; color: var(--gold);
    }
    .wlc-badge .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold);
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(.7); }
    }

    /* action buttons */
    .wlc-btns {
      display: flex; flex-direction: column;
      gap: 14px; width: 100%;
    }

    .wlc-btn {
      width: 100%; padding: 0 22px;
      height: 64px;
      border-radius: 20px;
      border: none; cursor: pointer;
      display: flex; align-items: center; gap: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px; font-weight: 600;
      transition: transform .13s, box-shadow .13s;
      text-align: left;
    }
    .wlc-btn:active { transform: scale(.97); box-shadow: none !important; }

    .wlc-btn-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .wlc-btn-text { flex: 1; }
    .wlc-btn-text .btn-title { display: block; font-size: 16px; font-weight: 700; }
    .wlc-btn-text .btn-sub   { display: block; font-size: 12px; opacity: .7; margin-top: 1px; }
    .wlc-btn-arrow { font-size: 18px; opacity: .5; }

    /* Button variants */
    .btn-primary {
      background: var(--gold);
      color: var(--ink);
      box-shadow: 0 6px 28px rgba(246,201,78,.35);
    }
    .btn-primary .wlc-btn-icon { background: rgba(0,0,0,.15); }

    .btn-secondary {
      background: var(--ink2);
      color: var(--txt);
      border: 1px solid var(--rim2);
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }
    .btn-secondary .wlc-btn-icon { background: var(--ink3); }

    .btn-ghost {
      background: transparent;
      color: var(--txt2);
      border: 1px solid var(--rim);
    }
    .btn-ghost .wlc-btn-icon { background: var(--ink3); }

    /* bottom link */
    .wlc-footer {
      font-size: 12px; color: var(--txt2);
      text-align: center; margin-top: 4px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CROSS STREETS SEARCH SCREEN
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #screen-search {
      background: var(--ink);
      padding: calc(var(--sat) + 20px) 24px calc(var(--sab) + 24px);
      z-index: 10;
    }

    .search-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 28px;
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--ink2); border: 1px solid var(--rim2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; flex-shrink: 0;
    }
    .back-btn:active { background: var(--ink3); }
    .search-header h2 {
      font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
      letter-spacing: -.5px;
    }

    .search-label {
      font-size: 12px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--txt2); margin-bottom: 8px;
    }
    .search-input {
      width: 100%; padding: 15px 18px;
      background: var(--ink2); border: 1px solid var(--rim2);
      border-radius: var(--r-md); color: var(--txt);
      font-family: 'DM Sans', sans-serif; font-size: 16px;
      outline: none; margin-bottom: 16px;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--gold); }
    .search-input::placeholder { color: var(--txt2); }

    .search-go {
      width: 100%; padding: 17px;
      background: var(--gold); color: var(--ink);
      font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700;
      border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 6px 24px rgba(246,201,78,.3);
      transition: transform .12s;
    }
    .search-go:active { transform: scale(.96); }

    .search-hint {
      margin-top: 20px; font-size: 13px; color: var(--txt2);
      line-height: 1.6; text-align: center;
    }
    .search-hint strong { color: var(--txt); }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       MAP SCREEN
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    #screen-map { z-index: 5; }

    #map { position: absolute; inset: 0; width: 100%; height: 100%; }

    .maplibregl-ctrl-attrib { display: none !important; }
    .maplibregl-ctrl-logo   { display: none !important; }
    .maplibregl-ctrl-group {
      background: rgba(16,19,28,0.92) !important;
      border: 1px solid var(--rim2) !important;
      border-radius: var(--r-sm) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
      overflow: hidden;
      box-shadow: 0 4px 22px rgba(0,0,0,.5) !important;
    }
    .maplibregl-ctrl-group button {
      background: transparent !important; width: 46px !important; height: 46px !important;
    }
    .maplibregl-ctrl-group button .maplibregl-ctrl-icon { filter: invert(1) brightness(0.5); }
    .maplibregl-ctrl-group button:active .maplibregl-ctrl-icon { filter: invert(1) brightness(1); }
    .maplibregl-ctrl-group button + button { border-top: 1px solid var(--rim) !important; }

    /* back to home button on map */
    #map-back {
      position: absolute; top: calc(var(--sat) + 14px); left: 14px;
      z-index: 30; width: 42px; height: 42px; border-radius: 12px;
      background: rgba(16,19,28,.92); backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--rim2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,.5);
      transition: transform .13s;
    }
    #map-back:active { transform: scale(.88); }

    /* map title pill */
    #map-title {
      position: absolute; top: calc(var(--sat) + 14px); left: 68px; right: 14px;
      z-index: 30;
      display: flex; align-items: center; gap: 7px;
      padding: 7px 13px; height: 42px;
      background: rgba(8,10,16,.8); backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--rim2); border-radius: 12px;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800;
      letter-spacing: -.3px;
      overflow: hidden;
    }
    #map-title span { color: var(--gold); }
    #map-title .gdot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--txt2); flex-shrink: 0; transition: background .3s;
      margin-left: auto;
    }
    #map-title .gdot.live    { background: var(--green); box-shadow: 0 0 7px var(--green); }
    #map-title .gdot.seeking { animation: blink 1.1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

    .fab {
      position: absolute; z-index: 30; width: 50px; height: 50px; border-radius: 50%;
      background: rgba(16,19,28,.92); backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--rim2); display: flex;
      align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer;
      box-shadow: 0 4px 22px rgba(0,0,0,.5);
      transition: transform .13s; -webkit-tap-highlight-color: transparent;
    }
    .fab:active { transform: scale(.88); }
    #btn-locate { right: 16px; bottom: 308px; }
    #btn-fuel   { right: 16px; bottom: 240px; }

    #sheet {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 20;
      background: var(--ink2);
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      border-top: 1px solid var(--rim2);
      box-shadow: 0 -12px 50px rgba(0,0,0,.6);
      padding-bottom: var(--sab);
      transition: transform .38s cubic-bezier(.32,.72,0,1);
    }
    #sheet.s0 { transform: translateY(calc(100% - 104px - var(--sab))); }
    #sheet.s1 { transform: translateY(calc(100% - 248px - var(--sab))); }
    #sheet.s2 { transform: translateY(calc(100% - 56vh  - var(--sab))); }

    .handle-bar {
      width: 40px; height: 4px; background: var(--rim2);
      border-radius: 2px; margin: 12px auto 0; cursor: pointer;
    }
    #fuel-row {
      display: flex; gap: 8px; padding: 14px 16px 0;
      overflow-x: auto; scrollbar-width: none;
    }
    #fuel-row::-webkit-scrollbar { display: none; }
    .ftab {
      flex-shrink: 0; padding: 8px 20px; min-height: 36px;
      border-radius: 50px; border: 1px solid var(--rim2);
      background: transparent; color: var(--txt2);
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .17s; display: flex; align-items: center;
    }
    .ftab.on { background: var(--gold); border-color: var(--gold); color: var(--ink); box-shadow: 0 3px 14px rgba(246,201,78,.28); }
    .ftab:active { transform: scale(.93); }

    #stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; margin: 14px 16px 0;
      background: var(--rim); border-radius: var(--r-sm); overflow: hidden;
    }
    .stat-cell { background: var(--ink3); padding: 10px 6px; text-align: center; }
    .sc-label {
      font-size: 10px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--txt2); margin-bottom: 4px;
    }
    .sc-val { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; letter-spacing: -.5px; }
    .cv-lo { color: var(--green); }
    .cv-av { color: var(--amber); }
    .cv-hi { color: var(--red); }
    .cv-n  { color: var(--txt); }

    #list-scroll {
      height: 38vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain; padding: 8px 0 0;
    }
    #list-scroll::-webkit-scrollbar { display: none; }
    .s-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; min-height: 66px;
      border-bottom: 1px solid var(--rim);
      cursor: pointer; transition: background .11s;
    }
    .s-row:active { background: var(--ink3); }
    .s-badge {
      width: 42px; height: 42px; flex-shrink: 0;
      border-radius: 12px; background: var(--ink3); border: 1px solid var(--rim2);
      display: flex; align-items: center; justify-content: center; font-size: 21px;
    }
    .s-info { flex: 1; min-width: 0; }
    .s-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .s-addr { font-size: 12px; color: var(--txt2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .s-dist { font-size: 11px; color: var(--txt2); margin-top: 3px; }
    .s-price { font-family: 'Syne', sans-serif; font-size: 21px; font-weight: 800; letter-spacing: -.6px; flex-shrink: 0; }
    .empty-state { padding: 36px 24px; text-align: center; font-size: 14px; color: var(--txt2); line-height: 1.7; }

    .maplibregl-popup-content {
      background: var(--ink2) !important; border: 1px solid var(--rim2) !important;
      border-radius: var(--r-md) !important; padding: 15px 17px !important;
      font-family: 'DM Sans', sans-serif !important; color: var(--txt) !important;
      box-shadow: 0 10px 40px rgba(0,0,0,.6) !important; min-width: 192px;
    }
    .maplibregl-popup-close-button {
      color: var(--txt2) !important; font-size: 22px !important;
      right: 8px !important; top: 6px !important; padding: 8px !important;
    }
    .maplibregl-popup-tip { border-top-color: var(--ink2) !important; }
    .pu-name { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; margin-bottom: 3px; }
    .pu-addr { font-size: 12px; color: var(--txt2); margin-bottom: 12px; }
    .pu-row  { display: flex; align-items: center; justify-content: space-between; }
    .pu-price { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -1px; }
    .pu-chip  { font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: 20px; }
    .chip-lo { background: rgba(57,224,138,.13); color: var(--green); }
    .chip-md { background: rgba(246,201,78,.13);  color: var(--amber); }
    .chip-hi { background: rgba(255,95,95,.13);   color: var(--red); }

    .u-dot {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--sky); border: 3px solid #fff;
      box-shadow: 0 0 0 0 rgba(79,163,255,.5);
      animation: gps-ring 2.3s ease-out infinite;
    }
    @keyframes gps-ring {
      0%   { box-shadow: 0 0 0 0    rgba(79,163,255,.5); }
      70%  { box-shadow: 0 0 0 16px rgba(79,163,255,0); }
      100% { box-shadow: 0 0 0 0    rgba(79,163,255,0); }
    }

    #toast {
      position: absolute; z-index: 100;
      top: calc(var(--sat) + 72px); left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: var(--ink3); border: 1px solid var(--rim2);
      border-radius: 50px; padding: 10px 20px;
      font-size: 13px; font-weight: 500; color: var(--txt);
      white-space: nowrap; box-shadow: 0 4px 22px rgba(0,0,0,.45);
      opacity: 0; pointer-events: none;
      transition: opacity .22s, transform .22s;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* GPS permission overlay (shown on map screen if needed) */
    #gps-overlay {
      position: absolute; inset: 0; z-index: 25;
      background: rgba(8,10,16,.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px; gap: 16px;
      transition: opacity .3s, visibility .3s;
    }
    #gps-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    #gps-overlay h3 {
      font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
      text-align: center;
    }
    #gps-overlay p { font-size: 14px; color: var(--txt2); text-align: center; line-height: 1.6; max-width: 260px; }
    .gps-allow-btn {
      padding: 15px 40px; background: var(--gold); color: var(--ink);
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
      border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 6px 24px rgba(246,201,78,.3);
    }
    .gps-skip-btn {
      background: none; border: none; color: var(--txt2);
      font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer;
    }
    .gps-spin {
      width: 24px; height: 24px; border: 3px solid var(--ink3);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin .7s linear infinite; display: none;
    }
    .gps-spin.on { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #gps-msg { font-size: 13px; color: var(--txt2); min-height: 16px; }
  </style>
</head>
<body>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     SCREEN 1: WELCOME
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<div class="screen" id="screen-welcome">
  <div class="wlc-glow"></div>

  <div class="wlc-top">
    <div class="wlc-emoji">&#x26FD;</div>
    <div class="wlc-title">Welcome to<br><span>Gassy</span></div>
    <p class="wlc-sub">Your go-to app for finding the cheapest gas in Los Angeles.</p>
    <div class="wlc-badge">
      <div class="dot"></div>
      Live prices updated daily
    </div>
  </div>

  <div class="wlc-btns">

    <!-- Button 1: Find Gas Station (GPS) -->
    <button class="wlc-btn btn-primary" onclick="goFindGas()">
      <div class="wlc-btn-icon">&#x1F4CD;</div>
      <div class="wlc-btn-text">
        <span class="btn-title">Find Gas Station</span>
        <span class="btn-sub">Near my current location</span>
      </div>
      <div class="wlc-btn-arrow">&#x203A;</div>
    </button>

    <!-- Button 2: Search Cross Streets -->
    <button class="wlc-btn btn-secondary" onclick="goSearch()">
      <div class="wlc-btn-icon">&#x1F50D;</div>
      <div class="wlc-btn-text">
        <span class="btn-title">Search Cross Streets</span>
        <span class="btn-sub">Enter an intersection</span>
      </div>
      <div class="wlc-btn-arrow">&#x203A;</div>
    </button>

    <!-- Button 3: Cheapest Gas Now -->
    <button class="wlc-btn btn-secondary" onclick="goCheapest()">
      <div class="wlc-btn-icon">&#x1F4B0;</div>
      <div class="wlc-btn-text">
        <span class="btn-title">Cheapest Gas Now</span>
        <span class="btn-sub">Best prices across all of LA</span>
      </div>
      <div class="wlc-btn-arrow">&#x203A;</div>
    </button>

  </div>

  <div class="wlc-footer">Los Angeles &amp; surrounding cities</div>
</div>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     SCREEN 2: CROSS STREETS SEARCH
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<div class="screen hidden" id="screen-search">
  <div class="search-header">
    <div class="back-btn" onclick="goHome()">&#x2190;</div>
    <h2>Search by Location</h2>
  </div>

  <div class="search-label">Street or Intersection</div>
  <input class="search-input" id="search-input"
    type="text" placeholder="e.g. Sunset &amp; Vine, Hollywood"
    autocomplete="off" autocorrect="off" autocapitalize="off" />

  <div class="search-label">City</div>
  <input class="search-input" id="search-city"
    type="text" placeholder="e.g. Los Angeles, Santa Monica"
    autocomplete="off" />

  <button class="search-go" onclick="doSearch()">Search for Gas Stations</button>

  <p class="search-hint">
    Try <strong>Sunset &amp; Highland</strong> or <strong>Lincoln &amp; Pico</strong><br>
    to find stations near any intersection.
  </p>
</div>

<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     SCREEN 3: MAP
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<div class="screen hidden" id="screen-map">

  <div id="map"></div>

  <!-- GPS permission overlay (shown inside map screen) -->
  <div id="gps-overlay">
    <div style="font-size:48px">&#x1F4CD;</div>
    <h3>Allow Location Access</h3>
    <p>Gassy needs your location to show gas stations near you.</p>
    <button class="gps-allow-btn" onclick="requestGPS()">Allow Location</button>
    <button class="gps-skip-btn" onclick="skipToLA()">Skip &mdash; use Los Angeles</button>
    <div class="gps-spin" id="gps-spin"></div>
    <div id="gps-msg"></div>
  </div>

  <!-- Top bar -->
  <div id="map-back" onclick="goHome()">&#x2190;</div>
  <div id="map-title">
    &#x26FD;&nbsp;<span id="map-title-text">Gassy</span>
    <div class="gdot seeking" id="gps-dot"></div>
  </div>

  <!-- FABs -->
  <button class="fab" id="btn-locate" onclick="recenter()">&#x1F4CD;</button>
  <button class="fab" id="btn-fuel"   onclick="cycleFuel()">&#x26A1;</button>

  <!-- Bottom sheet -->
  <div id="sheet" class="s0">
    <div class="handle-bar" id="handle"></div>
    <div id="fuel-row">
      <button class="ftab on"  data-fuel="regular"  onclick="setFuel(this)">Regular</button>
      <button class="ftab"     data-fuel="midgrade" onclick="setFuel(this)">Mid</button>
      <button class="ftab"     data-fuel="premium"  onclick="setFuel(this)">Premium</button>
      <button class="ftab"     data-fuel="diesel"   onclick="setFuel(this)">Diesel</button>
    </div>
    <div id="stats-bar">
      <div class="stat-cell"><div class="sc-label">Low</div><div class="sc-val cv-lo" id="sv-lo">&mdash;</div></div>
      <div class="stat-cell"><div class="sc-label">Avg</div><div class="sc-val cv-av" id="sv-av">&mdash;</div></div>
      <div class="stat-cell"><div class="sc-label">High</div><div class="sc-val cv-hi" id="sv-hi">&mdash;</div></div>
      <div class="stat-cell"><div class="sc-label">Near</div><div class="sc-val cv-n"  id="sv-ct">0</div></div>
    </div>
    <div id="list-scroll">
      <div class="empty-state" id="list-empty">Loading stations&hellip;</div>
      <div id="list-inner"></div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SUPABASE — swap in your credentials when ready
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var SB_URL = 'https://YOUR_PROJECT.supabase.co';
var SB_KEY = 'YOUR_ANON_KEY';
// var sb = window.supabase.createClient(SB_URL, SB_KEY);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var map = null;
var mapReady = false;
var userMarker, openPopup;
var userLat = 34.0522, userLng = -118.2437; // default: downtown LA
var fuel = 'regular';
var pins = [];
var snapState = 's0';
var SNAPS = ['s0','s1','s2'];
var FUELS = ['regular','midgrade','premium','diesel'];
var mapMode = 'nearby'; // 'nearby' | 'cheapest' | 'search'

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SCREEN NAVIGATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) {
    s.classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

function goHome() { showScreen('screen-welcome'); }

// Button 1: Find Gas Station — goes to map, asks for GPS
function goFindGas() {
  mapMode = 'nearby';
  document.getElementById('map-title-text').textContent = 'Near Me';
  showScreen('screen-map');
  initMapOnce(function() {
    requestGPS();
  });
}

// Button 2: Search Cross Streets
function goSearch() {
  showScreen('screen-search');
}

// Button 3: Cheapest Gas Now — goes to map, shows all sorted by price
function goCheapest() {
  mapMode = 'cheapest';
  document.getElementById('map-title-text').textContent = 'Cheapest Gas';
  showScreen('screen-map');
  initMapOnce(function() {
    hideGPSOverlay();
    // Sort by cheapest across all LA (no GPS needed)
    map.flyTo({ center: [userLng, userLat], zoom: 11, duration: 800 });
    loadStations();
    toast('Showing cheapest gas across LA');
  });
}

// Called from search screen
function doSearch() {
  var street = document.getElementById('search-input').value.trim();
  var city   = document.getElementById('search-city').value.trim() || 'Los Angeles';
  if (!street) {
    document.getElementById('search-input').focus(); return;
  }
  var query = encodeURIComponent(street + ', ' + city + ', CA');
  var url   = 'https://nominatim.openstreetmap.org/search?q=' + query + '&format=json&limit=1';

  mapMode = 'search';
  document.getElementById('map-title-text').textContent = street;
  showScreen('screen-map');

  initMapOnce(function() {
    hideGPSOverlay();
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data) {
        if (data && data.length > 0) {
          var lat = parseFloat(data[0].lat);
          var lng = parseFloat(data[0].lon);
          userLat = lat; userLng = lng;
          map.flyTo({ center: [lng, lat], zoom: 14, duration: 900 });
          loadStations();
          toast('Showing gas near ' + street);
        } else {
          toast('Location not found. Try a different address.');
        }
      })
      .catch(function() {
        toast('Search failed. Check your connection.');
      });
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// GPS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function requestGPS() {
  var spin = document.getElementById('gps-spin');
  var msg  = document.getElementById('gps-msg');
  var overlay = document.getElementById('gps-overlay');

  // Show the overlay asking for permission
  overlay.classList.remove('hidden');

  // Hide buttons, show spinner
  overlay.querySelector('.gps-allow-btn').style.display = 'none';
  overlay.querySelector('.gps-skip-btn').style.display  = 'none';
  spin.classList.add('on');
  msg.textContent = 'Requesting location...';

  if (!navigator.geolocation) {
    msg.textContent = 'GPS not available.';
    spin.classList.remove('on');
    skipToLA(); return;
  }
  navigator.geolocation.getCurrentPosition(onGrant, onDeny,
    { enableHighAccuracy: true, timeout: 14000, maximumAge: 0 });
}

function onGrant(pos) {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
  setGPSDot('live');
  hideGPSOverlay();
  if (userMarker) userMarker.setLngLat([userLng, userLat]);
  map.flyTo({ center: [userLng, userLat], zoom: 13, duration: 800 });
  loadStations();
  navigator.geolocation.watchPosition(function(p) {
    userLat = p.coords.latitude; userLng = p.coords.longitude;
    if (userMarker) userMarker.setLngLat([userLng, userLat]);
  }, null, { enableHighAccuracy: true, maximumAge: 8000 });
}

function onDeny() {
  document.getElementById('gps-spin').classList.remove('on');
  document.getElementById('gps-msg').textContent = 'Permission denied.';
  var overlay = document.getElementById('gps-overlay');
  overlay.querySelector('.gps-allow-btn').textContent = 'Try Again';
  overlay.querySelector('.gps-allow-btn').style.display = '';
  overlay.querySelector('.gps-skip-btn').style.display  = '';
}

function skipToLA() {
  setGPSDot('');
  hideGPSOverlay();
  map.flyTo({ center: [userLng, userLat], zoom: 12, duration: 800 });
  loadStations();
  toast('Showing Los Angeles area');
}

function hideGPSOverlay() {
  document.getElementById('gps-overlay').classList.add('hidden');
}
function setGPSDot(cls) {
  document.getElementById('gps-dot').className = 'gdot ' + cls;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MAP INIT (only created once)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initMapOnce(callback) {
  if (mapReady) { callback(); return; }
  if (map) {
    // Map exists but may still be loading
    map.once('load', function() { mapReady = true; callback(); });
    return;
  }

  map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.stadiamaps.com/styles/alidade_smooth_dark.json',
    center: [userLng, userLat],
    zoom: 12, minZoom: 9, maxZoom: 19,
    padding: { top: 80, bottom: 300, left: 16, right: 16 }
  });

  map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

  var dotEl = document.createElement('div');
  dotEl.className = 'u-dot';
  userMarker = new maplibregl.Marker({ element: dotEl, anchor: 'center' })
    .setLngLat([userLng, userLat]).addTo(map);

  map.on('load', function() {
    mapReady = true;
    callback();
  });

  map.on('click', function() {
    if (openPopup) { openPopup.remove(); openPopup = null; }
    snap('s0');
  });
}

function recenter() {
  if (map) map.flyTo({ center: [userLng, userLat], zoom: 14, duration: 900, essential: true });
  toast('Centered on your location');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LOAD STATIONS
//
// Supabase table: gas_stations
// Columns: id, name, address, latitude, longitude,
//          regular_price, midgrade_price, premium_price,
//          diesel_price, updated_at
//
// TODO: delete mock block + uncomment Supabase query
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function loadStations() {
  clearPins();

  // -- SUPABASE QUERY (uncomment when ready) --
  // var col = fuel + '_price';
  // sb.from('gas_stations')
  //   .select('id,name,address,latitude,longitude,' + col)
  //   .not(col, 'is', null)
  //   .order(col, { ascending: true })
  //   .limit(50)
  //   .then(function(res) {
  //     if (res.error) { console.error(res.error); return; }
  //     renderStations(res.data.map(function(s) {
  //       return Object.assign({}, s, { price: s[col] });
  //     }));
  //   });
  // return;
  // -------------------------------------------

  var stations = mockData(fuel);

  // If cheapest mode, sort by price instead of distance
  if (mapMode === 'cheapest') {
    stations.sort(function(a,b){ return a.price - b.price; });
  }

  renderStations(stations);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderStations(stations) {
  var empty = document.getElementById('list-empty');
  if (!stations.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  var prices = stations.map(function(s){ return s.price; });
  var lo = Math.min.apply(null, prices);
  var hi = Math.max.apply(null, prices);
  var av = prices.reduce(function(a,b){return a+b;},0) / prices.length;
  var rng = hi - lo || 1;

  document.getElementById('sv-lo').textContent = '$' + lo.toFixed(2);
  document.getElementById('sv-av').textContent = '$' + av.toFixed(2);
  document.getElementById('sv-hi').textContent = '$' + hi.toFixed(2);
  document.getElementById('sv-ct').textContent = stations.length;

  var sorted = stations.map(function(s) {
    return Object.assign({}, s, { km: hav(userLat, userLng, s.latitude, s.longitude) });
  });

  // Sort by distance for nearby/search, by price for cheapest
  if (mapMode === 'cheapest') {
    sorted.sort(function(a,b){ return a.price - b.price; });
  } else {
    sorted.sort(function(a,b){ return a.km - b.km; });
  }

  var inner = document.getElementById('list-inner');
  inner.innerHTML = '';

  sorted.forEach(function(s) {
    var r     = (s.price - lo) / rng;
    var col   = rCol(r);
    var chip  = rChip(r);
    var chipC = r < .33 ? 'chip-lo' : r < .66 ? 'chip-md' : 'chip-hi';

    var el = document.createElement('div');
    el.style.cssText = 'position:relative;width:46px;height:46px;background:'+col+';border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid rgba(0,0,0,.2);cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.45)';
    var lbl = document.createElement('div');
    lbl.textContent = '$'+s.price.toFixed(2);
    lbl.style.cssText = "position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transform:rotate(45deg);font-family:'DM Sans',sans-serif;font-size:9.5px;font-weight:700;color:rgba(0,0,0,.85)";
    el.appendChild(lbl);
    (function(st,c,ch,chC){
      el.addEventListener('click', function(e){ e.stopPropagation(); showPopup(st,c,ch,chC); snap('s0'); });
    })(s, col, chip, chipC);
    pins.push(new maplibregl.Marker({ element: el, anchor: 'bottom' }).setLngLat([s.longitude, s.latitude]).addTo(map));

    var row = document.createElement('div');
    row.className = 's-row';
    var dist = s.km < 1 ? Math.round(s.km*1000)+'m' : s.km.toFixed(1)+'km';
    row.innerHTML =
      '<div class="s-badge">'+sIcon(s.name)+'</div>' +
      '<div class="s-info">' +
        '<div class="s-name">'+s.name+'</div>' +
        '<div class="s-addr">'+s.address+'</div>' +
        '<div class="s-dist">'+dist+' away</div>' +
      '</div>' +
      '<div class="s-price" style="color:'+col+'">$'+s.price.toFixed(2)+'</div>';
    (function(st,c,ch,chC){
      row.addEventListener('click', function(){
        map.flyTo({ center:[st.longitude,st.latitude], zoom:15, duration:700 });
        showPopup(st,c,ch,chC); snap('s0');
      });
    })(s, col, chip, chipC);
    inner.appendChild(row);
  });

  snap('s1');
}

function showPopup(s, col, chip, chipC) {
  if (openPopup) openPopup.remove();
  openPopup = new maplibregl.Popup({ closeButton:true, offset:24 })
    .setLngLat([s.longitude, s.latitude])
    .setHTML(
      '<div class="pu-name">'+s.name+'</div>' +
      '<div class="pu-addr">'+s.address+'</div>' +
      '<div class="pu-row">' +
        '<div class="pu-price" style="color:'+col+'">$'+s.price.toFixed(2)+'</div>' +
        '<div class="pu-chip '+chipC+'">'+chip+'</div>' +
      '</div>'
    ).addTo(map);
}

function setFuel(btn) {
  document.querySelectorAll('.ftab').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  fuel = btn.dataset.fuel;
  if (mapReady) loadStations();
}
function cycleFuel() {
  var next = FUELS[(FUELS.indexOf(fuel)+1) % FUELS.length];
  setFuel(document.querySelector('.ftab[data-fuel="'+next+'"]'));
  toast('Switched to '+next.charAt(0).toUpperCase()+next.slice(1));
}

function snap(s) { document.getElementById('sheet').className = s; snapState = s; }
document.getElementById('handle').addEventListener('click', function(){
  snap(SNAPS[(SNAPS.indexOf(snapState)+1) % SNAPS.length]);
});
var ty = 0;
document.getElementById('sheet').addEventListener('touchstart', function(e){ ty = e.touches[0].clientY; }, {passive:true});
document.getElementById('sheet').addEventListener('touchend', function(e){
  var dy = ty - e.changedTouches[0].clientY;
  if (Math.abs(dy) < 20) return;
  var i = SNAPS.indexOf(snapState);
  if (dy > 0 && i < 2) snap(SNAPS[i+1]);
  else if (dy < 0 && i > 0) snap(SNAPS[i-1]);
}, {passive:true});

function clearPins() { pins.forEach(function(p){ p.remove(); }); pins = []; }
function rCol(r)  { return r<.33 ? 'var(--green)' : r<.66 ? 'var(--amber)' : 'var(--red)'; }
function rChip(r) { return r<.33 ? 'Best price'  : r<.66 ? 'Average'      : 'Above avg'; }
function hav(la1,lo1,la2,lo2) {
  var R=6371, dL=(la2-la1)*Math.PI/180, dG=(lo2-lo1)*Math.PI/180;
  var a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dG/2)*Math.sin(dG/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function sIcon(n) {
  n = n.toLowerCase();
  if (n.indexOf('costco')  >=0) return '🟦';
  if (n.indexOf('shell')   >=0) return '🔴';
  if (n.indexOf('arco')    >=0) return '🟢';
  if (n.indexOf('chevron') >=0) return '⬛';
  if (n.indexOf('mobil')   >=0) return '🔵';
  if (n.indexOf('76')      >=0) return '🟠';
  return '⛽';
}
var _tt;
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MOCK DATA — delete once Supabase is connected
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function mockData(f) {
  var b = { regular:4.29, midgrade:4.59, premium:4.89, diesel:4.99 }[f];
  return [
    {id:1,name:'Chevron',  address:'1234 Sunset Blvd, Los Angeles',    latitude:34.0761,longitude:-118.3266,price:b-.22},
    {id:2,name:'Shell',    address:'890 Wilshire Blvd, Los Angeles',   latitude:34.0615,longitude:-118.3008,price:b+.11},
    {id:3,name:'ARCO',     address:'5500 Hollywood Blvd, Hollywood',   latitude:34.1019,longitude:-118.3267,price:b-.31},
    {id:4,name:'76',       address:'2200 Lincoln Blvd, Santa Monica',  latitude:34.0195,longitude:-118.4912,price:b+.04},
    {id:5,name:'Costco',   address:'2901 Los Feliz Blvd, Los Angeles', latitude:34.1125,longitude:-118.2614,price:b-.40},
    {id:6,name:'Mobil',    address:'3400 Crenshaw Blvd, Los Angeles',  latitude:34.0099,longitude:-118.3336,price:b+.18},
    {id:7,name:'Circle K', address:'1000 Venice Blvd, Venice',         latitude:33.9972,longitude:-118.4471,price:b-.09},
    {id:8,name:'BP',       address:'6700 Sepulveda Blvd, Van Nuys',    latitude:34.1820,longitude:-118.4496,price:b+.25},
  ];
}
