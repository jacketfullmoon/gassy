<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!--
    MOBILE-FIRST VIEWPORT
    viewport-fit=cover  → content fills behind iPhone notch / Dynamic Island
    user-scalable=no    → disable accidental pinch-zoom on UI chrome
  -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0,
                 maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable"                content="yes" />
  <meta name="apple-mobile-web-app-capable"          content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title"            content="GasFinder" />
  <meta name="theme-color"                           content="#080a10" />
  <title>GasFinder</title>

  <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"><\/script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink:       #080a10;
      --ink2:      #10131c;
      --ink3:      #181d28;
      --rim:       rgba(255,255,255,0.06);
      --rim2:      rgba(255,255,255,0.10);
      --gold:      #f6c94e;
      --gold-dim:  rgba(246,201,78,0.18);
      --green:     #39e08a;
      --amber:     #f6c94e;
      --red:       #ff5f5f;
      --sky:       #4fa3ff;
      --txt:       #eceef5;
      --txt2:      #7c8499;
      --r-sm:      10px;
      --r-md:      18px;
      --r-lg:      26px;
      --sat: env(safe-area-inset-top,    0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: -webkit-fill-available; }
    body {
      width: 100%; height: 100vh;
      height: -webkit-fill-available;
      background: var(--ink);
      color: var(--txt);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── MAP ── */
    #map { position: absolute; inset: 0; width: 100%; height: 100%; }
    .maplibregl-ctrl-attrib,
    .maplibregl-ctrl-logo { display: none !important; }
    .maplibregl-ctrl-group {
      background: rgba(16,19,28,0.92) !important;
      border: 1px solid var(--rim2) !important;
      border-radius: var(--r-sm) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
      overflow: hidden;
      box-shadow: 0 4px 22px rgba(0,0,0,.5) !important;
    }
    .maplibregl-ctrl-group button {
      background: transparent !important;
      width: 46px !important; height: 46px !important;
    }
    .maplibregl-ctrl-group button .maplibregl-ctrl-icon { filter: invert(1) brightness(0.5); }
    .maplibregl-ctrl-group button:active .maplibregl-ctrl-icon { filter: invert(1) brightness(1); }
    .maplibregl-ctrl-group button + button { border-top: 1px solid var(--rim) !important; }

    /* ── SPLASH ── */
    #splash {
      position: absolute; inset: 0; z-index: 200;
      background: var(--ink);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0; padding: 48px 36px;
      transition: opacity .5s ease, visibility .5s ease;
    }
    #splash.gone { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-glow {
      position: absolute; width: 280px; height: 280px; border-radius: 50%;
      background: radial-gradient(circle, rgba(246,201,78,.12) 0%, transparent 68%);
      pointer-events: none;
    }
    .splash-icon {
      position: relative; width: 92px; height: 92px;
      background: var(--gold-dim); border: 1px solid rgba(246,201,78,.28);
      border-radius: 28px; display: flex; align-items: center; justify-content: center;
      font-size: 46px; margin-bottom: 28px;
      animation: breathe 2.4s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { box-shadow: 0 0 0 0 rgba(246,201,78,.25); }
      50%     { box-shadow: 0 0 0 18px rgba(246,201,78,0); }
    }
    .splash-title {
      font-family: 'Syne', sans-serif; font-size: 38px; font-weight: 800;
      letter-spacing: -1.5px; color: var(--txt); text-align: center; margin-bottom: 14px;
    }
    .splash-title em { color: var(--gold); font-style: normal; }
    .splash-sub {
      font-size: 15px; color: var(--txt2); text-align: center;
      line-height: 1.65; max-width: 270px; margin-bottom: 36px;
    }
    #splash-cta {
      width: 100%; max-width: 300px; padding: 17px 0;
      background: var(--gold); color: var(--ink);
      font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700;
      border: none; border-radius: 50px; cursor: pointer;
      box-shadow: 0 6px 28px rgba(246,201,78,.35);
      transition: transform .12s, box-shadow .12s;
    }
    #splash-cta:active { transform: scale(.95); box-shadow: none; }
    #splash-skip {
      margin-top: 14px; background: none; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: var(--txt2); cursor: pointer;
    }
    .splash-spin {
      width: 26px; height: 26px; border: 3px solid var(--ink3);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin .7s linear infinite; margin-top: 4px; display: none;
    }
    .splash-spin.on { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #splash-msg { margin-top: 12px; font-size: 13px; color: var(--txt2); text-align: center; min-height: 16px; }

    /* ── TOPBAR ── */
    #topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 30;
      pointer-events: none;
      padding: calc(var(--sat) + 14px) 14px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .wordmark {
      font-family: 'Syne', sans-serif; font-size: 19px; font-weight: 800;
      letter-spacing: -.6px; color: var(--txt); pointer-events: auto;
      text-shadow: 0 2px 14px rgba(0,0,0,.75);
    }
    .wordmark span { color: var(--gold); }
    #gps-pill {
      display: flex; align-items: center; gap: 7px; padding: 7px 13px;
      background: rgba(8,10,16,.8); backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--rim2); border-radius: 50px;
      font-size: 12px; font-weight: 500; color: var(--txt2);
      pointer-events: auto; cursor: pointer;
      max-width: 160px; overflow: hidden;
    }
    #gps-pill span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gdot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--txt2); flex-shrink: 0; transition: background .3s;
    }
    .gdot.live    { background: var(--green); box-shadow: 0 0 7px var(--green); }
    .gdot.seeking { animation: blink 1.1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

    /* ── FABS ── */
    .fab {
      position: absolute; z-index: 30; width: 50px; height: 50px; border-radius: 50%;
      background: rgba(16,19,28,.92); backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--rim2); display: flex;
      align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer;
      box-shadow: 0 4px 22px rgba(0,0,0,.5);
      transition: transform .13s; -webkit-tap-highlight-color: transparent;
    }
    .fab:active { transform: scale(.88); }
    #btn-locate { right: 16px; bottom: 308px; }
    #btn-fuel   { right: 16px; bottom: 240px; }

    /* ── BOTTOM SHEET ── */
    #sheet {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 20;
      background: var(--ink2);
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      border-top: 1px solid var(--rim2);
      box-shadow: 0 -12px 50px rgba(0,0,0,.6);
      padding-bottom: var(--sab);
      transition: transform .38s cubic-bezier(.32,.72,0,1);
      will-change: transform;
    }
    #sheet.s0 { transform: translateY(calc(100% - 104px - var(--sab))); }
    #sheet.s1 { transform: translateY(calc(100% - 248px - var(--sab))); }
    #sheet.s2 { transform: translateY(calc(100% - 56vh  - var(--sab))); }

    .handle-bar {
      width: 40px; height: 4px; background: var(--rim2);
      border-radius: 2px; margin: 12px auto 0; cursor: pointer;
    }

    /* Fuel tabs */
    #fuel-row {
      display: flex; gap: 8px; padding: 14px 16px 0;
      overflow-x: auto; scrollbar-width: none;
    }
    #fuel-row::-webkit-scrollbar { display: none; }
    .ftab {
      flex-shrink: 0; padding: 8px 20px; min-height: 36px;
      border-radius: 50px; border: 1px solid var(--rim2);
      background: transparent; color: var(--txt2);
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .17s;
      display: flex; align-items: center;
    }
    .ftab.on { background: var(--gold); border-color: var(--gold); color: var(--ink); box-shadow: 0 3px 14px rgba(246,201,78,.28); }
    .ftab:active { transform: scale(.93); }

    /* Stats bar */
    #stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; margin: 14px 16px 0;
      background: var(--rim); border-radius: var(--r-sm); overflow: hidden;
    }
    .stat-cell { background: var(--ink3); padding: 10px 6px; text-align: center; }
    .sc-label {
      font-size: 10px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--txt2); margin-bottom: 4px;
    }
    .sc-val { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; letter-spacing: -.5px; }
    .cv-lo { color: var(--green); }
    .cv-av { color: var(--amber); }
    .cv-hi { color: var(--red); }
    .cv-n  { color: var(--txt); }

    /* Station list */
    #list-scroll {
      height: 38vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain; padding: 8px 0 0;
    }
    #list-scroll::-webkit-scrollbar { display: none; }
    .s-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; min-height: 66px;
      border-bottom: 1px solid var(--rim);
      cursor: pointer; transition: background .11s;
    }
    .s-row:active { background: var(--ink3); }
    .s-badge {
      width: 42px; height: 42px; flex-shrink: 0;
      border-radius: 12px; background: var(--ink3); border: 1px solid var(--rim2);
      display: flex; align-items: center; justify-content: center; font-size: 21px;
    }
    .s-info { flex: 1; min-width: 0; }
    .s-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .s-addr { font-size: 12px; color: var(--txt2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .s-dist { font-size: 11px; color: var(--txt2); margin-top: 3px; }
    .s-price { font-family: 'Syne', sans-serif; font-size: 21px; font-weight: 800; letter-spacing: -.6px; flex-shrink: 0; }
    .empty-state { padding: 36px 24px; text-align: center; font-size: 14px; color: var(--txt2); line-height: 1.7; }

    /* ── POPUP ── */
    .maplibregl-popup-content {
      background: var(--ink2) !important; border: 1px solid var(--rim2) !important;
      border-radius: var(--r-md) !important; padding: 15px 17px !important;
      font-family: 'DM Sans', sans-serif !important; color: var(--txt) !important;
      box-shadow: 0 10px 40px rgba(0,0,0,.6) !important; min-width: 192px;
    }
    .maplibregl-popup-close-button {
      color: var(--txt2) !important; font-size: 22px !important;
      right: 8px !important; top: 6px !important; padding: 8px !important;
    }
    .maplibregl-popup-tip { border-top-color: var(--ink2) !important; }
    .pu-name { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800; margin-bottom: 3px; }
    .pu-addr { font-size: 12px; color: var(--txt2); margin-bottom: 12px; }
    .pu-row  { display: flex; align-items: center; justify-content: space-between; }
    .pu-price { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -1px; }
    .pu-chip  { font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: 20px; }
    .chip-lo { background: rgba(57,224,138,.13); color: var(--green); }
    .chip-md { background: rgba(246,201,78,.13);  color: var(--amber); }
    .chip-hi { background: rgba(255,95,95,.13);   color: var(--red); }

    /* ── GPS DOT ── */
    .u-dot {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--sky); border: 3px solid #fff;
      box-shadow: 0 0 0 0 rgba(79,163,255,.5);
      animation: gps-ring 2.3s ease-out infinite;
    }
    @keyframes gps-ring {
      0%   { box-shadow: 0 0 0 0   rgba(79,163,255,.5); }
      70%  { box-shadow: 0 0 0 16px rgba(79,163,255,0); }
      100% { box-shadow: 0 0 0 0   rgba(79,163,255,0); }
    }

    /* ── TOAST ── */
    #toast {
      position: absolute; z-index: 100;
      top: calc(var(--sat) + 72px); left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: var(--ink3); border: 1px solid var(--rim2);
      border-radius: 50px; padding: 10px 20px;
      font-size: 13px; font-weight: 500; color: var(--txt);
      white-space: nowrap; box-shadow: 0 4px 22px rgba(0,0,0,.45);
      opacity: 0; pointer-events: none;
      transition: opacity .22s, transform .22s;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- SPLASH / GPS PERMISSION SCREEN -->
<div id="splash">
  <div class="splash-glow"></div>
  <div class="splash-icon">&#x26FD;</div>
  <div class="splash-title">Gas<em>Finder</em></div>
  <p class="splash-sub">Instantly find the cheapest gas near you. No sign-up required.</p>
  <button id="splash-cta" onclick="requestGPS()">Enable My Location</button>
  <button id="splash-skip" onclick="skipToLA()">Skip &mdash; show Los Angeles</button>
  <div class="splash-spin" id="s-spin"></div>
  <div id="splash-msg"></div>
</div>

<div id="map"></div>

<div id="topbar">
  <div class="wordmark">&#x26FD;&nbsp;Gas<span>Finder</span></div>
  <div id="gps-pill" onclick="recenter()">
    <div class="gdot seeking" id="gps-dot"></div>
    <span id="gps-txt">Locating&hellip;</span>
  </div>
</div>

<button class="fab" id="btn-locate" onclick="recenter()" title="My location">&#x1F4CD;</button>
<button class="fab" id="btn-fuel"   onclick="cycleFuel()" title="Switch fuel">&#x26A1;</button>

<div id="toast"></div>

<div id="sheet" class="s0">
  <div class="handle-bar" id="handle"></div>

  <div id="fuel-row">
    <button class="ftab on"  data-fuel="regular"  onclick="setFuel(this)">Regular</button>
    <button class="ftab"     data-fuel="midgrade" onclick="setFuel(this)">Mid</button>
    <button class="ftab"     data-fuel="premium"  onclick="setFuel(this)">Premium</button>
    <button class="ftab"     data-fuel="diesel"   onclick="setFuel(this)">Diesel</button>
  </div>

  <div id="stats-bar">
    <div class="stat-cell"><div class="sc-label">Low</div><div class="sc-val cv-lo" id="sv-lo">&mdash;</div></div>
    <div class="stat-cell"><div class="sc-label">Avg</div><div class="sc-val cv-av" id="sv-av">&mdash;</div></div>
    <div class="stat-cell"><div class="sc-label">High</div><div class="sc-val cv-hi" id="sv-hi">&mdash;</div></div>
    <div class="stat-cell"><div class="sc-label">Near</div><div class="sc-val cv-n"  id="sv-ct">0</div></div>
  </div>

  <div id="list-scroll">
    <div class="empty-state" id="list-empty">Waiting for GPS&hellip;</div>
    <div id="list-inner"></div>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 1. SUPABASE SETUP
//    TODO: replace with your real project URL + anon key
//    https://app.supabase.com -> Settings -> API
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SB_URL = 'https://YOUR_PROJECT.supabase.co';
const SB_KEY = 'YOUR_ANON_KEY';
// const sb = window.supabase.createClient(SB_URL, SB_KEY);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 2. APP STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let map, userMarker, openPopup;
let userLat = 34.0522, userLng = -118.2437;  // fallback: downtown LA
let fuel = 'regular';
let pins = [];
let snapState = 's0';
const SNAPS = ['s0','s1','s2'];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 3. GPS - fires immediately when CTA is tapped
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function requestGPS() {
  const cta  = document.getElementById('splash-cta');
  const skip = document.getElementById('splash-skip');
  const spin = document.getElementById('s-spin');
  const msg  = document.getElementById('splash-msg');
  cta.style.display = skip.style.display = 'none';
  spin.classList.add('on');
  msg.textContent = 'Requesting location\u2026';

  if (!navigator.geolocation) {
    msg.textContent = 'GPS not available \u2014 using Los Angeles.';
    spin.classList.remove('on');
    skipToLA(); return;
  }
  navigator.geolocation.getCurrentPosition(onGrant, onDeny,
    { enableHighAccuracy: true, timeout: 14000, maximumAge: 0 });
}

function onGrant(pos) {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
  setPill('live', fmt(userLat, userLng));
  hideSplash();
  bootMap(userLng, userLat);
  navigator.geolocation.watchPosition(p => {
    userLat = p.coords.latitude; userLng = p.coords.longitude;
    userMarker && userMarker.setLngLat([userLng, userLat]);
    setPill('live', fmt(userLat, userLng));
  }, null, { enableHighAccuracy: true, maximumAge: 8000 });
}

function onDeny() {
  const msg = document.getElementById('splash-msg');
  const cta = document.getElementById('splash-cta');
  const skip = document.getElementById('splash-skip');
  document.getElementById('s-spin').classList.remove('on');
  msg.textContent = 'Permission denied.';
  cta.textContent = 'Try Again';
  cta.style.display = skip.style.display = '';
}

function skipToLA() {
  setPill('', 'Los Angeles'); hideSplash(); bootMap(userLng, userLat);
}
function hideSplash() { document.getElementById('splash').classList.add('gone'); }
function setPill(cls, label) {
  const d = document.getElementById('gps-dot');
  d.className = 'gdot ' + cls;
  document.getElementById('gps-txt').textContent = label;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 4. MAP INIT - centers on user's GPS coordinates
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function bootMap(lng, lat) {
  map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/dark',
    center: [lng, lat],
    zoom: 14.5, minZoom: 9, maxZoom: 19,
    padding: { top: 80, bottom: 300, left: 16, right: 16 },
  });
  map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

  const dotEl = document.createElement('div');
  dotEl.className = 'u-dot';
  userMarker = new maplibregl.Marker({ element: dotEl, anchor: 'center' })
    .setLngLat([lng, lat]).addTo(map);

  map.on('load', () => loadStations());
  map.on('click', () => { openPopup && openPopup.remove(); openPopup = null; snap('s0'); });
}

function recenter() {
  map && map.flyTo({ center: [userLng, userLat], zoom: 14.5, duration: 950, essential: true });
  toast('Centered on your location');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 6. RENDER MARKERS + LIST
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderStations(stations) {
  const empty = document.getElementById('list-empty');
  if (!stations.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  const prices = stations.map(s => s.price);
  const lo = Math.min(...prices), hi = Math.max(...prices);
  const av = prices.reduce((a,b)=>a+b,0)/prices.length;
  const rng = hi - lo || 1;

  document.getElementById('sv-lo').textContent = '$'+lo.toFixed(2);
  document.getElementById('sv-av').textContent = '$'+av.toFixed(2);
  document.getElementById('sv-hi').textContent = '$'+hi.toFixed(2);
  document.getElementById('sv-ct').textContent = stations.length;

  const sorted = stations
    .map(s => ({ ...s, km: hav(userLat,userLng,s.latitude,s.longitude) }))
    .sort((a,b) => a.km - b.km);

  const inner = document.getElementById('list-inner');
  inner.innerHTML = '';

  sorted.forEach(s => {
    const r = (s.price - lo) / rng;
    const col = rCol(r), chip = rChip(r), chipC = r<.33?'chip-lo':r<.66?'chip-md':'chip-hi';

    // Pin
    const el = document.createElement('div');
    el.style.cssText = 'position:relative;width:46px;height:46px;background:'+col+';border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid rgba(0,0,0,.2);cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.45);transition:transform .12s';
    const lbl = document.createElement('div');
    lbl.textContent = '$'+s.price.toFixed(2);
    lbl.style.cssText = "position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transform:rotate(45deg);font-family:'DM Sans',sans-serif;font-size:9.5px;font-weight:700;color:rgba(0,0,0,.85);letter-spacing:-.2px";
    el.appendChild(lbl);
    el.addEventListener('click', e => { e.stopPropagation(); showPopup(s,col,chip,chipC); snap('s0'); });
    pins.push(new maplibregl.Marker({ element: el, anchor: 'bottom' }).setLngLat([s.longitude,s.latitude]).addTo(map));

    // Row
    const row = document.createElement('div');
    row.className = 's-row';
    const dist = s.km < 1 ? Math.round(s.km*1000)+'m' : s.km.toFixed(1)+'km';
    row.innerHTML = '<div class="s-badge">'+sIcon(s.name)+'</div><div class="s-info"><div class="s-name">'+s.name+'</div><div class="s-addr">'+s.address+'</div><div class="s-dist">'+dist+' away</div></div><div class="s-price" style="color:'+col+'">$'+s.price.toFixed(2)+'</div>';
    row.addEventListener('click', () => { map.flyTo({center:[s.longitude,s.latitude],zoom:15.5,duration:700}); showPopup(s,col,chip,chipC); snap('s0'); });
    inner.appendChild(row);
  });

  snap('s1');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 7. POPUP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showPopup(s, col, chip, chipC) {
  openPopup && openPopup.remove();
  openPopup = new maplibregl.Popup({ closeButton:true, offset:24 })
    .setLngLat([s.longitude,s.latitude])
    .setHTML('<div class="pu-name">'+s.name+'</div><div class="pu-addr">'+s.address+'</div><div class="pu-row"><div class="pu-price" style="color:'+col+'">$'+s.price.toFixed(2)+'</div><div class="pu-chip '+chipC+'">'+chip+'</div></div>')
    .addTo(map);
}

function setFuel(btn) {
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  fuel = btn.dataset.fuel;
  if (map) loadStations();
}
const FUELS = ['regular','midgrade','premium','diesel'];
function cycleFuel() {
  const next = FUELS[(FUELS.indexOf(fuel)+1) % FUELS.length];
  setFuel(document.querySelector('.ftab[data-fuel="'+next+'"]'));
  toast('Switched to '+next.charAt(0).toUpperCase()+next.slice(1));
}

// 9. BOTTOM SHEET SNAPPING + SWIPE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function snap(s) { document.getElementById('sheet').className = s; snapState = s; }
document.getElementById('handle').addEventListener('click', () => {
  snap(SNAPS[(SNAPS.indexOf(snapState)+1) % SNAPS.length]);
});
let ty = 0;
const sh = document.getElementById('sheet');
sh.addEventListener('touchstart', e => { ty = e.touches[0].clientY; }, { passive:true });
sh.addEventListener('touchend',   e => {
  const dy = ty - e.changedTouches[0].clientY;
  if (Math.abs(dy) < 20) return;
  const i = SNAPS.indexOf(snapState);
  if (dy > 0 && i < 2) snap(SNAPS[i+1]);
  else if (dy < 0 && i > 0) snap(SNAPS[i-1]);
}, { passive:true });

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 10. HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function clearPins() { pins.forEach(p=>p.remove()); pins=[]; }
function rCol(r) { return r<.33?'var(--green)':r<.66?'var(--amber)':'var(--red)'; }
function rChip(r) { return r<.33?'Best price':r<.66?'Average':'Above avg'; }
function hav(la1,lo1,la2,lo2) {
  const R=6371,dL=(la2-la1)*Math.PI/180,dG=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmt(la,lo) { return la.toFixed(3)+'\u00b0, '+lo.toFixed(3)+'\u00b0'; }
function sIcon(n) {
  n=n.toLowerCase();
  if(n.includes('costco'))return'\uD83D\uDFE6';
  if(n.includes('shell'))return'\uD83D\uDD34';
  if(n.includes('arco'))return'\uD83D\uDFE2';
  if(n.includes('chevron'))return'\u2B1B';
  if(n.includes('mobil'))return'\uD83D\uDD35';
  if(n.includes('76'))return'\uD83D\uDFE0';
  return'\u26FD';
}
let _tt;
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2600);
}
