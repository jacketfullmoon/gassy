<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Test</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
  <style>
    body { margin: 0; background: #111; color: white; font-family: sans-serif; padding: 20px; }
    #status { font-size: 18px; margin-bottom: 10px; }
    #map { width: 100%; height: 70vh; }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <div id="map"></div>

  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <script>
    if (typeof maplibregl === 'undefined') {
      document.getElementById('status').textContent = 'ERROR: MapLibre did not load. Check your internet connection.';
    } else {
      document.getElementById('status').textContent = 'MapLibre loaded! Building map...';
      try {
        var map = new maplibregl.Map({
          container: 'map',
          style: {
            version: 8,
            sources: {
              osm: {
                type: 'raster',
                tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                tileSize: 256,
                attribution: 'OpenStreetMap contributors'
              }
            },
            layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
          },
          center: [-118.2437, 34.0522],
          zoom: 12
        });
        map.on('load', function() {
          document.getElementById('status').textContent = 'SUCCESS - Map is working!';
        });
        map.on('error', function(e) {
          document.getElementById('status').textContent = 'Map error: ' + JSON.stringify(e.error);
        });
      } catch(e) {
        document.getElementById('status').textContent = 'JS Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
